<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>支云门店员工综合考核</title>
<style>
:root{--primary:#1A3C5E;--accent:#C8963E;--bg:#F7F4EF;--card:#FFF;--text:#2C3E50;--text2:#6B7B8D;--border:#E0DCD5;--success:#3D7A4F;--error:#C75B5B}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.65}
.topbar{background:var(--primary);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;color:#fff;position:fixed;top:0;left:0;right:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15);height:56px}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{height:34px}
.topbar-title{font-size:17px;font-weight:600;letter-spacing:1px}
.topbar-info{font-size:13px;opacity:.85;display:flex;gap:16px}
.container{max-width:860px;margin:0 auto;padding:76px 20px 60px}
.card{background:var(--card);border-radius:14px;padding:32px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:20px}
.card h2{font-size:22px;margin-bottom:8px;color:var(--primary)}
.card .sub{color:var(--text2);font-size:14px;margin-bottom:24px}
.login-page .logo-big{text-align:center;margin-bottom:24px}
.login-page .logo-big img{height:60px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:14px;font-weight:600;margin-bottom:6px}
.form-group input{width:100%;padding:12px 16px;font-size:16px;border:2px solid var(--border);border-radius:10px;font-family:inherit;transition:.2s;background:var(--bg)}
.form-group input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px rgba(200,150,62,.1)}
.btn{display:inline-block;padding:14px 40px;font-size:17px;font-weight:600;border:none;border-radius:12px;cursor:pointer;letter-spacing:1px;transition:.2s;font-family:inherit}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 14px rgba(26,60,94,.3)}
.btn-primary:hover{transform:translateY(-1px)}
.btn-accent{background:var(--accent);color:#fff}
.btn-outline{background:#fff;color:var(--primary);border:2px solid var(--primary)}
.btn-sm{padding:8px 20px;font-size:14px}
.exam-header{background:var(--card);border-radius:14px;padding:16px 24px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.exam-header .timer{font-size:28px;font-weight:700;color:var(--primary);font-variant-numeric:tabular-nums}
.exam-header .timer.warn{color:var(--error);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.4}}
.sec-title{font-size:18px;font-weight:700;color:var(--primary);margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--accent)}
.sec-title span{font-size:13px;font-weight:400;color:var(--text2);margin-left:8px}
.q-block{background:var(--card);border-radius:12px;padding:24px 28px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);border-left:4px solid var(--accent)}
.q-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
.q-num{font-weight:700;color:var(--primary);font-size:16px;white-space:nowrap}
.q-cat{font-size:11px;color:var(--accent);background:#FFF8EE;padding:2px 8px;border-radius:4px;white-space:nowrap}
.q-text{font-size:16px;line-height:1.8;margin-bottom:16px}
.q-icon{max-height:56px;vertical-align:middle;margin:0 4px;border-radius:4px;display:inline}
.q-lux-img{max-height:160px;display:block;margin:10px 0;border-radius:8px;border:1px solid var(--border)}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:flex-start;padding:13px 16px;border-radius:10px;border:2px solid var(--border);cursor:pointer;transition:.15s;font-size:15px}
.opt:hover{background:#F0F4F8;border-color:#B0C4D8}
.opt.sel{background:#EEF2F7;border-color:var(--primary)}
.opt input{margin-right:10px;margin-top:2px;accent-color:var(--primary);width:18px;height:18px}
.fill-inp{width:100%;max-width:400px;padding:12px 16px;font-size:16px;border:2px solid var(--border);border-radius:10px;font-family:inherit;transition:.15s;background:var(--bg)}
.fill-inp:focus{outline:none;border-color:var(--accent)}
.nav-bar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:20px}
.nav-bar .btn-nav{padding:12px 32px;font-size:15px;font-weight:600;border:none;border-radius:10px;cursor:pointer;transition:.2s;font-family:inherit}
.btn-prev{background:#fff;color:var(--primary);border:2px solid var(--primary)!important}
.btn-next{background:var(--primary);color:#fff}
.btn-next:disabled,.btn-prev:disabled{opacity:.4;cursor:not-allowed}
.q-indicator{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
.q-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:.2s;cursor:pointer}
.q-dot.done{background:var(--success)}
.q-dot.cur{background:var(--accent);transform:scale(1.4)}
.q-progress{text-align:center;font-size:13px;color:var(--text2);margin-bottom:4px}
.result-hero{text-align:center;padding:40px 20px}
.score-circle{width:150px;height:150px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;flex-direction:column;border:6px solid;margin-bottom:16px}
.score-circle .big{font-size:52px;font-weight:800;line-height:1}
.score-circle .unit{font-size:14px}
.grade-label{font-size:24px;font-weight:700}
.grade-hint{color:var(--text2);font-size:14px;margin-top:4px}
.sc-excellent{color:#3D7A4F;border-color:#3D7A4F;background:#EAF4ED}
.sc-good{color:#1A3C5E;border-color:#1A3C5E;background:#E8EEF4}
.sc-pass{color:#D4A040;border-color:#D4A040;background:#FEF9EF}
.sc-fail{color:#C75B5B;border-color:#C75B5B;background:#FDF0F0}
.review-item{padding:16px 20px;border-radius:10px;margin-bottom:10px;border:1px solid var(--border)}
.review-item.ok{border-left:4px solid var(--success);background:#F7FAF8}
.review-item.ng{border-left:4px solid var(--error);background:#FDF7F7}
.review-q{font-weight:600;margin-bottom:6px}
.review-a{font-size:14px}
.review-a .ua{color:var(--error)}
.review-a .ca{color:var(--success);font-weight:600}
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px}
.hidden{display:none!important}
@media print{body{background:#fff}.topbar,.btn-row,.nav-bar,.btn,.q-indicator,.q-progress,.no-print{display:none!important}.container{max-width:100%;padding:20px!important}.card{box-shadow:none;border:none;page-break-inside:avoid}.review-item{break-inside:avoid}@page{margin:1.5cm}#printHeader{display:flex!important;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid #1A3C5E}}
@media(max-width:600px){.container{padding:70px 10px 60px}.card{padding:20px 16px}.topbar{padding:8px 12px;height:50px}.topbar-logo{height:26px}.topbar-title{font-size:14px}.topbar-info{display:none}.exam-header{padding:12px 16px}.exam-header .timer{font-size:20px}.q-block{padding:18px 16px}.q-text{font-size:15px}.score-circle{width:120px;height:120px}.score-circle .big{font-size:40px}.opt{font-size:14px;padding:10px 12px}}
</style>
</head>

function b64decode(s){var b=atob(s),u=new Uint8Array(b.length);for(var i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return new TextDecoder("utf-8").decode(u)}

var cats=Object.keys(mcByCat),mcPicked=[];
cats.forEach(function(cat){var p=shuffle(mcByCat[cat]);if(p.length)mcPicked.push(p[0])});
var left=shuffle(MC_BANK.filter(function(q){return!mcPicked.find(function(p){return p.id===q.id})}));
for(var i=0;i<left.length&&mcPicked.length<10;i++)mcPicked.push(left[i]);
mcPicked=shuffle(mcPicked).slice(0,10);
var fillByCat={};allFill.forEach(function(q){if(!fillByCat[q.cat])fillByCat[q.cat]=[];fillByCat[q.cat].push(q)});
var fillPicked=[];Object.keys(fillByCat).forEach(function(cat){var p=shuffle(fillByCat[cat]);if(p.length)fillPicked.push(p[0])});
var fleft=shuffle(allFill.filter(function(q){return!fillPicked.find(function(p){return p.id===q.id})}));
for(var i=0;i<fleft.length&&fillPicked.length<20;i++)fillPicked.push(fleft[i]);
fillPicked=shuffle(fillPicked).slice(0,20);
return{mc:mcPicked,fill:fillPicked}
}

else{gc="sc-fail";gl="\u4e0d\u5408\u683c";gh="\u9700\u91cd\u65b0\u57f9\u8bad\u540e\u8865\u8003"}
document.getElementById("resultHero").innerHTML='<div class="score-circle '+gc+'"><div class="big">'+total+'</div><div class="unit">/ '+maxScore+'</div></div><div class="grade-label">'+gl+'</div><div class="grade-hint">'+gh+'</div><div style="margin-top:12px;color:var(--text2);font-size:14px;">\u9009\u62e9\u9898 '+mcScore+'\u5206 | \u586b\u7a7a\u9898 '+fillScore+'\u5206</div>';
var rh='<div class="card"><h2 style="font-size:18px;margin-bottom:16px">\u7b54\u9898\u8be6\u60c5</h2>';
mcResults.forEach(function(r,i){
rh+='<div class="review-item '+(r.correct?"ok":"ng")+'"><div class="review-q">'+(r.correct?"\u2705":"\u274c")+' '+(i+1)+'. '+(r.q||"").substring(0,80)+'</div>';
if(!r.correct){var ut=r.userLetter?r.userLetter+". "+(r[r.userLetter.toLowerCase()]||""):"\u672a\u4f5c\u7b54";var ct=r.correctLetter?r.correctLetter+". "+(r[r.correctLetter.toLowerCase()]||""):"";rh+='<div class="review-a"><span class="ua">\u4f60\u7684\u7b54\u6848\uff1a'+ut+'</span> | <span class="ca">\u6b63\u786e\u7b54\u6848\uff1a'+ct+'</span></div>'}
rh+='</div>';
});
fillResults.forEach(function(r,i){
var n=mcResults.length+i+1;
rh+='<div class="review-item '+(r.correct?"ok":"ng")+'"><div class="review-q">'+(r.correct?"\u2705":"\u274c")+' '+(i+1)+'. '+(r.q||"").substring(0,80)+'</div>';
if(!r.correct)rh+='<div class="review-a"><span class="ua">\u4f60\u7684\u7b54\u6848\uff1a'+(r.userAns||"\u672a\u4f5c\u7b54")+'</span> | <span class="ca">\u6b63\u786e\u7b54\u6848\uff1a'+(r.correctAns||"")+'</span></div>';
rh+='</div>';
});
rh+='</div>';
document.getElementById("reviewContainer").innerHTML=rh;
document.getElementById("resultBtns").innerHTML='<button class="btn btn-outline btn-sm" onclick="printPDF()">\u4e0b\u8f7dPDF</button> <button class="btn btn-primary btn-sm" onclick="location.reload()">\u91cd\u65b0\u8003\u8bd5</button>';
document.getElementById("printMeta").textContent="\u8003\u751f\uff1a"+userName+" | \u5165\u804c\uff1a"+hireDate+" | \u5f97\u5206\uff1a"+total+"/"+maxScore+" | \u8bc4\u7ea7\uff1a"+gl;
document.getElementById("resultPage").scrollIntoView({behavior:"smooth"});
}

function printPDF(){document.getElementById("printHeader").style.display="flex";window.print();setTimeout(function(){document.getElementById("printHeader").style.display="none"},500)}
window.addEventListener("beforeunload",function(e){if(document.getElementById("examPage")&&!document.getElementById("examPage").classList.contains("hidden")){e.preventDefault();e.returnValue=""}});

</script>
