name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - uses: gradle/actions/setup-gradle@v3
        with:
          build-root-directory: apk

      - name: Copy assets
        run: |
          mkdir -p apk/app/src/main/assets/icons
          cp index.html apk/app/src/main/assets/
          cp -r icons/* apk/app/src/main/assets/icons/
          cp manifest.json apk/app/src/main/assets/
          cp sw.js apk/app/src/main/assets/

      - name: Build APK
        run: cd apk && gradle wrapper && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: zhiyun-exam-apk
          path: apk/app/build/outputs/apk/debug/*.apk
