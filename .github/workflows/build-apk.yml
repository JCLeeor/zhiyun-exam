name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Copy exam files into assets
        run: |
          mkdir -p android-project/app/src/main/assets/icons
          cp index.html android-project/app/src/main/assets/
          cp -r icons/* android-project/app/src/main/assets/icons/
          cp manifest.json android-project/app/src/main/assets/
          cp sw.js android-project/app/src/main/assets/

      - name: Build Debug APK
        run: cd android-project && chmod +x gradlew && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: zhiyun-exam-debug
          path: android-project/app/build/outputs/apk/debug/*.apk
